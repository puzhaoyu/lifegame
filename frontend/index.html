<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两阵营生命游戏</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0f;
            --bg-surface: #12121a;
            --grid-line: #1a1a2e;
            --cell-dead: #0d0d14;
            --cell-red: #ff3366;
            --cell-red-glow: rgba(255, 51, 102, 0.5);
            --cell-blue: #3366ff;
            --cell-blue-glow: rgba(51, 102, 255, 0.5);
            --cell-wall: #555566;
            --cell-wall-glow: rgba(85, 85, 102, 0.3);
            --cell-hv: #ffd700;
            --cell-hv-glow: rgba(255, 215, 0, 0.5);
            --accent-red: #ff3366;
            --accent-blue: #3366ff;
            --text-primary: #e0e0e0;
            --text-muted: #666680;
            --transition: cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'JetBrains Mono', monospace; background: var(--bg-deep); color: var(--text-primary); min-height: 100vh; }
        .app { max-width: 1400px; margin: 0 auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: linear-gradient(135deg, rgba(26, 26, 46, 0.8), rgba(18, 18, 26, 0.9)); border: 1px solid var(--grid-line); border-radius: 12px; }
        .logo { display: flex; align-items: center; gap: 16px; }
        .logo-icon { width: 48px; height: 48px; background: linear-gradient(135deg, var(--cell-red), var(--cell-blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(255, 51, 102, 0.3); animation: pulse 2s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 20px rgba(255, 51, 102, 0.3), 0 0 20px rgba(51, 102, 255, 0.3); } 50% { box-shadow: 0 0 40px rgba(255, 51, 102, 0.5), 0 0 40px rgba(51, 102, 255, 0.5); } }
        .logo-text h1 { font-size: 24px; font-weight: 700; background: linear-gradient(90deg, var(--cell-red), var(--cell-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .logo-text p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .stats { display: flex; gap: 24px; }
        .stat { text-align: center; padding: 8px 16px; border-radius: 8px; background: rgba(26, 26, 46, 0.5); }
        .stat-value { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 4px; }
        .grid-container { background: var(--bg-surface); border: 1px solid var(--grid-line); border-radius: 12px; padding: 16px; overflow: auto; position: relative; }
        .grid-container.border-walls { box-shadow: inset 0 0 0 2px rgba(100, 200, 255, 0.15); }
        .border-indicator { position: absolute; top: 8px; right: 8px; font-size: 10px; color: rgba(100, 200, 255, 0.5); text-transform: uppercase; letter-spacing: 0.1em; pointer-events: none; }
        .grid-canvas { display: grid; gap: 1px; background: var(--grid-line); border-radius: 4px; cursor: crosshair; }
        .cell { background: var(--cell-dead); aspect-ratio: 1; transition: all 0.15s; }
        .cell.red { background: var(--cell-red); box-shadow: 0 0 8px var(--cell-red-glow); }
        .cell.blue { background: var(--cell-blue); box-shadow: 0 0 8px var(--cell-blue-glow); }
        .cell.wall { background: var(--cell-wall); border-radius: 2px; box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), inset 0 -1px 0 rgba(0,0,0,0.3); }
        .cell.bomb { background: #ff9933; border-radius: 50%; box-shadow: 0 0 8px rgba(255, 153, 51, 0.6); animation: bombPulse 1s ease-in-out infinite; }
        .cell.high-value {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            box-shadow: 0 0 10px var(--cell-hv-glow);
            animation: hvPulse 1.5s ease-in-out infinite;
        }
        @keyframes hvPulse {
            0%, 100% { box-shadow: 0 0 8px rgba(255, 215, 0, 0.4); filter: brightness(1); }
            50% { box-shadow: 0 0 16px rgba(255, 215, 0, 0.8); filter: brightness(1.2); }
        }
        @keyframes bombPulse { 0%, 100% { box-shadow: 0 0 6px rgba(255, 153, 51, 0.4); } 50% { box-shadow: 0 0 12px rgba(255, 153, 51, 0.8); } }
        .btn.wall-team { border-color: var(--cell-wall); color: var(--cell-wall); }
        .btn.wall-team.active, .btn.wall-team:hover { background: var(--cell-wall); color: white; }
        .controls { display: flex; flex-wrap: wrap; gap: 16px; padding: 20px; background: linear-gradient(135deg, rgba(26, 26, 46, 0.8), rgba(18, 18, 26, 0.9)); border: 1px solid var(--grid-line); border-radius: 12px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        .control-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; }
        .button-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 16px; border: 1px solid var(--grid-line); border-radius: 8px; background: var(--bg-surface); color: var(--text-primary); font-family: inherit; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: var(--grid-line); transform: translateY(-1px); }
        .btn.primary { background: linear-gradient(135deg, var(--cell-red), var(--cell-blue)); border-color: transparent; color: white; }
        .btn.red-team { border-color: var(--cell-red); color: var(--cell-red); }
        .btn.red-team.active, .btn.red-team:hover { background: var(--cell-red); color: white; }
        .btn.blue-team { border-color: var(--cell-blue); color: var(--cell-blue); }
        .btn.blue-team.active, .btn.blue-team:hover { background: var(--cell-blue); color: white; }
        .btn.wall-team { border-color: var(--cell-wall); color: var(--cell-wall); }
        .btn.wall-team.active, .btn.wall-team:hover { background: var(--cell-wall); color: white; }
        .btn.eraser { border-color: #666680; color: #666680; }
        .btn.eraser.active, .btn.eraser:hover { background: #666680; color: white; }
        .btn.bomb-team { border-color: #ff9933; color: #ff9933; }
        .btn.bomb-team.active, .btn.bomb-team:hover { background: #ff9933; color: white; }
        .btn.hv-team { border-color: var(--cell-hv); color: var(--cell-hv); }
        .btn.hv-team.active, .btn.hv-team:hover { background: var(--cell-hv); color: #1a1a2e; }
        .btn.active { background: linear-gradient(135deg, var(--accent-red), #cc0055); border-color: var(--accent-red); color: white; }
        .btn svg { width: 16px; height: 16px; }
        .btn.border-toggle { border-color: rgba(100, 200, 255, 0.4); color: rgba(100, 200, 255, 0.8); }
        .btn.border-toggle.active { background: rgba(100, 200, 255, 0.15); border-color: rgba(100, 200, 255, 0.6); color: rgba(100, 200, 255, 1); }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider { -webkit-appearance: none; width: 120px; height: 6px; background: var(--grid-line); border-radius: 3px; }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: linear-gradient(135deg, var(--cell-red), var(--cell-blue)); border-radius: 50%; cursor: pointer; }
        .slider-value { font-size: 13px; background: linear-gradient(90deg, var(--cell-red), var(--cell-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .preset-btn { padding: 6px 12px; border: 1px solid var(--grid-line); border-radius: 6px; background: transparent; color: var(--text-muted); font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.2s; }
        .preset-btn:hover, .preset-btn.active { border-color: var(--text-primary); color: var(--text-primary); background: var(--text-primary); color: var(--bg-deep); }
        .patterns-section { display: flex; flex-direction: column; gap: 12px; }
        .patterns-container { display: flex; gap: 8px; flex-wrap: wrap; }
        .pattern-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 12px; border: 1px solid var(--grid-line); border-radius: 8px; background: transparent; color: var(--text-muted); font-family: inherit; font-size: 11px; cursor: pointer; transition: all 0.2s; min-width: 70px; }
        .pattern-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .pattern-btn.active { background: linear-gradient(135deg, rgba(255, 51, 102, 0.2), rgba(51, 102, 255, 0.2)); border-color: var(--cell-red); color: var(--text-primary); }
        .pattern-preview { width: 32px; height: 32px; display: grid; gap: 1px; place-content: center; }
        .pattern-cell { background: transparent; }
        .pattern-cell.alive { background: linear-gradient(135deg, var(--cell-red), var(--cell-blue)); border-radius: 1px; }
        .rotate-group { display: flex; gap: 4px; align-items: center; }
        .rotate-btn { width: 32px; height: 32px; padding: 0; display: flex; align-items: center; justify-content: center; border: 1px solid var(--grid-line); border-radius: 6px; background: transparent; color: var(--text-muted); cursor: pointer; transition: all 0.2s; font-size: 16px; }
        .rotate-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .rotate-btn.active { border-color: var(--cell-red); color: var(--cell-red); background: rgba(255, 51, 102, 0.1); }
        .rules { padding: 20px 24px; background: linear-gradient(135deg, rgba(26, 26, 46, 0.6), rgba(18, 18, 26, 0.8)); border: 1px solid var(--grid-line); border-radius: 12px; }
        .rules h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; background: linear-gradient(90deg, var(--cell-red), var(--cell-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .rules-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .rule { display: flex; align-items: flex-start; gap: 10px; font-size: 12px; color: var(--text-muted); }
        .rule-icon { flex-shrink: 0; width: 24px; height: 24px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
        .rule-icon.red { background: rgba(255, 51, 102, 0.2); color: var(--cell-red); }
        .rule-icon.blue { background: rgba(51, 102, 255, 0.2); color: var(--cell-blue); }
        .rule-icon.die { background: rgba(255, 100, 100, 0.2); color: #ff6464; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; z-index: 10000; }
        .loading-spinner { width: 60px; height: 60px; border: 3px solid #1a1a2e; border-top-color: #ff3366; border-right-color: #3366ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: #888899; font-size: 14px; }
        .toast { position: fixed; bottom: 24px; right: 24px; padding: 16px 24px; background: var(--bg-surface); border: 1px solid var(--cell-red); border-radius: 8px; color: var(--text-primary); font-size: 14px; box-shadow: 0 0 30px rgba(255, 51, 102, 0.3); transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 100; }
        .toast.show { transform: translateY(0); opacity: 1; }

        /* 光环扩散特效 */
        .ripple-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; overflow: visible; }
        .ripple { position: absolute; border-radius: 50%; animation: rippleExpand 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        .ripple.red { border: 3px solid rgba(255, 51, 102, 0.8); box-shadow: 0 0 20px rgba(255, 51, 102, 0.6), inset 0 0 20px rgba(255, 51, 102, 0.2); }
        .ripple.blue { border: 3px solid rgba(51, 102, 255, 0.8); box-shadow: 0 0 20px rgba(51, 102, 255, 0.6), inset 0 0 20px rgba(51, 102, 255, 0.2); }
        .ripple.bomb { border: 3px solid rgba(255, 153, 51, 0.9); box-shadow: 0 0 30px rgba(255, 153, 51, 0.7), 0 0 60px rgba(255, 80, 0, 0.4), inset 0 0 30px rgba(255, 153, 51, 0.3); animation: bombExpand 0.6s cubic-bezier(0.17, 0.67, 0.35, 1.2) forwards; }
        .ripple.gold { border: 3px solid rgba(255, 215, 0, 0.9); box-shadow: 0 0 30px rgba(255, 215, 0, 0.7), 0 0 60px rgba(255, 170, 0, 0.4); animation: hvDestroy 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes hvDestroy {
            0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%) scale(0) rotate(0deg); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(0.8) rotate(180deg); }
            100% { width: 80px; height: 80px; opacity: 0; transform: translate(-50%, -50%) scale(1) rotate(360deg); }
        }
        @keyframes bombExpand {
            0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%) scale(0); }
            30% { opacity: 1; }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        /* 炸弹冲击波 */
        .shockwave { position: absolute; border-radius: 50%; border: 2px solid rgba(255, 200, 100, 0.6); animation: shockwaveExpand 0.5s ease-out forwards; }
        @keyframes shockwaveExpand {
            0% { width: 0; height: 0; opacity: 0.8; transform: translate(-50%, -50%) scale(0); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes rippleExpand {
            0% { width: 0; height: 0; opacity: 1; transform: translate(-50%, -50%) scale(0); }
            50% { opacity: 0.8; }
            100% { width: 150px; height: 150px; opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 粒子爆炸特效 */
        .particle { position: absolute; width: 4px; height: 4px; border-radius: 50%; animation: particleBurst 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
        @keyframes particleBurst {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0); }
        }

        /* 隐藏文件上传输入 */
        .hidden-input { display: none; }

        @media (max-width: 768px) { .header { flex-direction: column; gap: 20px; } .stats { width: 100%; justify-content: space-around; } .controls { flex-direction: column; } }
    </style>
</head>
<body>
    <div id="root"><div class="loading"><div class="loading-spinner"></div><div class="loading-text">初始化生命引擎...</div></div></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
        const { useState, useEffect, useCallback, useRef } = React;
        const API_BASE = 'http://localhost:8080';
        const PlayIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>);
        const PauseIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>);
        const StepIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polygon points="5 4 15 12 5 20 5 4"></polygon><line x1="19" y1="5" x2="19" y2="19"></line></svg>);
        const RefreshIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>);
        const TrashIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>);
        const RotateIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 1 1-9-9"></path><polyline points="21 3 21 9 15 9"></polyline></svg>);
        const SaveIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>);
        const LoadIcon = () => (<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>);

        const PATTERNS = {
            block: { name: '方块', cells: [[0,0],[0,1],[1,0],[1,1]], size: 2 },
            blinker: { name: '闪烁者', cells: [[0,1],[1,1],[2,1]], size: 3 },
            glider: { name: '滑翔机', cells: [[0,1],[1,2],[2,0],[2,1],[2,2]], size: 3 },
            lwss: { name: 'LWSS', cells: [[1,0],[4,0],[0,1],[0,2],[4,2],[0,3],[1,3],[2,3],[3,3]], size: 5 },
            toad: { name: '蟾蜍', cells: [[1,0],[2,0],[3,0],[0,1],[1,1],[2,1]], size: 4 },
            beacon: { name: '信标', cells: [[0,0],[1,0],[0,1],[3,2],[3,3],[2,3]], size: 4 },
            diehard: { name: '死硬', cells: [[1,0],[1,1],[0,2],[2,2],[6,2],[7,2],[8,2]], size: 9 },
            acorn: { name: '橡果', cells: [[1,0],[3,1],[0,2],[1,2],[4,2],[5,2],[6,2]], size: 7 },
        };

        // 旋转函数 (x, y) -> (y, -x) for 90deg CW
        const rotateCells = (cells, rotation) => {
            if (rotation === 0) return cells;
            const rotated = cells.map(([x, y]) => {
                switch (rotation) {
                    case 90: return [y, -x];
                    case 180: return [-x, -y];
                    case 270: return [-y, x];
                    default: return [x, y];
                }
            });
            const minX = Math.min(...rotated.map(c => c[0]));
            const minY = Math.min(...rotated.map(c => c[1]));
            return rotated.map(([x, y]) => [x - minX, y - minY]);
        };

        const PatternPreview = ({ pattern, rotation = 0 }) => {
            const rotatedCells = rotateCells(pattern.cells, rotation);
            const cellSet = new Set(rotatedCells.map(([x, y]) => `${x},${y}`));
            const cols = rotatedCells.length > 0 ? Math.max(...rotatedCells.map(c => c[0])) + 1 : pattern.size;
            const rows = rotatedCells.length > 0 ? Math.max(...rotatedCells.map(c => c[1])) + 1 : pattern.size;
            const gridMax = Math.max(cols, rows);
            const cellPx = Math.max(2, Math.floor(32 / (gridMax + 1)));
            return (<div className="pattern-preview" style={{ gridTemplateColumns: `repeat(${cols}, ${cellPx}px)`, gridTemplateRows: `repeat(${rows}, ${cellPx}px)`, width: 'fit-content' }}>
                {Array.from({ length: rows }, (_, y) => Array.from({ length: cols }, (_, x) => (<div key={`${x}-${y}`} className={`pattern-cell ${cellSet.has(`${x},${y}`) ? 'alive' : ''}`} style={{ width: cellPx, height: cellPx }} />)))}
            </div>);
        };

        // 光环特效组件
        const PatternEffects = ({ effects }) => {
            if (!effects || effects.length === 0) return null;
            return (
                <div className="ripple-container">
                    {effects.map((effect) => (
                        <React.Fragment key={effect.id}>
                            {/* 主光环 */}
                            <div
                                className={`ripple ${effect.team === 1 ? 'red' : effect.team === 2 ? 'blue' : effect.team === 5 ? 'gold' : 'bomb'}`}
                                style={{ left: effect.x, top: effect.y, ...(effect.size ? { width: effect.size, height: effect.size } : {}) }}
                            />
                            {/* 粒子爆炸 */}
                            {Array.from({ length: effect.team === 5 ? 8 : 12 }, (_, i) => {
                                const count = effect.team === 5 ? 8 : 12;
                                const angle = (i / count) * Math.PI * 2;
                                const distance = 40 + Math.random() * 30;
                                const tx = Math.cos(angle) * distance;
                                const ty = Math.sin(angle) * distance;
                                const color = effect.team === 1 ? 'var(--cell-red)' : effect.team === 2 ? 'var(--cell-blue)' : effect.team === 5 ? 'var(--cell-hv)' : '#ff9933';
                                const glow = effect.team === 1 ? 'var(--cell-red-glow)' : effect.team === 2 ? 'var(--cell-blue-glow)' : effect.team === 5 ? 'var(--cell-hv-glow)' : 'rgba(255,153,51,0.5)';
                                return (
                                    <div
                                        key={`p-${i}`}
                                        className="particle"
                                        style={{
                                            left: effect.x,
                                            top: effect.y,
                                            '--tx': `${tx}px`,
                                            '--ty': `${ty}px`,
                                            background: color,
                                            boxShadow: `0 0 6px ${glow}`
                                        }}
                                    />
                                );
                            })}
                        </React.Fragment>
                    ))}
                </div>
            );
        };

        const useGameState = () => {
            const [gameState, setGameState] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [speed, setSpeed] = useState(10);
            const [selectedTeam, setSelectedTeam] = useState(1);
            const [bombRadius, setBombRadius] = useState(5);
            const [selectedPattern, setSelectedPattern] = useState(null);
            const [patternRotation, setPatternRotation] = useState(0);
            const [gridSize, setGridSize] = useState({ width: 60, height: 40 });
            const [cellSize, setCellSize] = useState(12);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [toast, setToast] = useState({ show: false, message: '' });
            const [effects, setEffects] = useState([]);
            const intervalRef = useRef(null);
            const fileInputRef = useRef(null);

            const showToast = useCallback((message) => { setToast({ show: true, message }); setTimeout(() => setToast({ show: false, message: '' }), 2000); }, []);
            
            const onEffectComplete = useCallback((id) => {
                setEffects(prev => prev.filter(e => e.id !== id));
            }, []);

            const placePattern = useCallback(async (patternKey, rotation, centerX, centerY, clientX, clientY) => {
                const pattern = PATTERNS[patternKey];
                if (!pattern || !gameState) return;
                try {
                    const effectId = Date.now() + Math.random();
                    setEffects(prev => [...prev, { id: effectId, x: clientX, y: clientY, team: selectedTeam }]);
                    setTimeout(() => { setEffects(prev => prev.filter(e => e.id !== effectId)); }, 800);

                    const rotatedCells = rotateCells(pattern.cells, rotation);
                    const minX = Math.min(...rotatedCells.map(c => c[0]));
                    const maxX = Math.max(...rotatedCells.map(c => c[0]));
                    const minY = Math.min(...rotatedCells.map(c => c[1]));
                    const maxY = Math.max(...rotatedCells.map(c => c[1]));
                    const offsetX = centerX - Math.floor((minX + maxX) / 2);
                    const offsetY = centerY - Math.floor((minY + maxY) / 2);
                    const endpoint = selectedTeam === 1 ? 'set_red' : selectedTeam === 2 ? 'set_blue' : 'set_wall';
                    for (const [cx, cy] of rotatedCells) {
                        const x = (cx + offsetX + gameState.width) % gameState.width;
                        const y = (cy + offsetY + gameState.height) % gameState.height;
                        await fetch(`${API_BASE}/api/${endpoint}/${x}/${y}`, { method: 'POST' });
                    }
                    const response = await fetch(`${API_BASE}/api/state`);
                    const data = await response.json();
                    setGameState(data);
                    showToast(`已放置: ${pattern.name} (${rotation}°)`);
                } catch (err) { setError(err.message); }
            }, [gameState, selectedTeam, showToast]);

            const fetchState = useCallback(async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/state`);
                    if (!response.ok) throw new Error('Failed to fetch state');
                    const data = await response.json();
                    setGameState(data);
                    setGridSize({ width: data.width, height: data.height });
                    setIsLoading(false);
                } catch (err) { setError(err.message); setIsLoading(false); }
            }, []);

            const initGrid = useCallback(async (width, height) => {
                try {
                    const response = await fetch(`${API_BASE}/api/init`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ width, height }) });
                    const data = await response.json();
                    setGameState(data);
                    setGridSize({ width, height });
                    showToast(`网格已初始化: ${width}x${height}`);
                } catch (err) { setError(err.message); }
            }, [showToast]);

            const setCell = useCallback(async (x, y, team) => {
                try {
                    if (team === 4) return; // 炸弹不走这里
                    const endpoint = team === 1 ? 'set_red' : team === 2 ? 'set_blue' : team === 3 ? 'set_wall' : team === 5 ? 'set_high_value' : 'set_dead';
                    const response = await fetch(`${API_BASE}/api/${endpoint}/${x}/${y}`, { method: 'POST' });
                    const data = await response.json();
                    setGameState(data);
                } catch (err) { setError(err.message); }
            }, []);

            const placeBomb = useCallback(async (x, y, radius) => {
                try {
                    const response = await fetch(`${API_BASE}/api/bomb/${x}/${y}/${radius}`, { method: 'POST' });
                    const data = await response.json();
                    setGameState(data);
                    showToast(`已放置炸弹 (半径: ${radius})`);
                } catch (err) { setError(err.message); }
            }, [showToast]);

            const triggerExplosionEffects = useCallback((explosions, gridEl) => {
                if (!explosions || explosions.length === 0 || !gridEl) return;
                const rect = gridEl.getBoundingClientRect();
                explosions.forEach(([ex, ey, eradius]) => {
                    const effectId = Date.now() + Math.random();
                    const pixelX = rect.left + ex * (cellSize + 1) + cellSize / 2;
                    const pixelY = rect.top + ey * (cellSize + 1) + cellSize / 2;
                    const size = eradius * cellSize * 2 + 40;
                    setEffects(prev => [...prev, { id: effectId, x: pixelX, y: pixelY, team: 4, size: size }]);
                    setTimeout(() => { setEffects(prev => prev.filter(e => e.id !== effectId)); }, 800);
                });
                if (explosions.length > 0) {
                    showToast(`${explosions.length} 个炸弹被触发!`);
                }
            }, [cellSize, showToast]);

            const triggerHvDestroyEffects = useCallback((destroyed, gridEl) => {
                if (!destroyed || destroyed.length === 0 || !gridEl) return;
                const rect = gridEl.getBoundingClientRect();
                destroyed.forEach(([hx, hy]) => {
                    const effectId = Date.now() + Math.random();
                    const pixelX = rect.left + hx * (cellSize + 1) + cellSize / 2;
                    const pixelY = rect.top + hy * (cellSize + 1) + cellSize / 2;
                    setEffects(prev => [...prev, { id: effectId, x: pixelX, y: pixelY, team: 5, size: 80 }]);
                    setTimeout(() => { setEffects(prev => prev.filter(e => e.id !== effectId)); }, 800);
                });
                if (destroyed.length > 0) {
                    showToast(`${destroyed.length} 个高价值单位被消除!`);
                }
            }, [cellSize, showToast]);

            const step = useCallback(async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/step`, { method: 'POST' });
                    const data = await response.json();
                    setGameState(data);
                    const gridEl = document.querySelector('.grid-canvas');
                    if (data.last_explosions && data.last_explosions.length > 0) {
                        triggerExplosionEffects(data.last_explosions, gridEl);
                    }
                    if (data.last_hv_destroyed && data.last_hv_destroyed.length > 0) {
                        triggerHvDestroyEffects(data.last_hv_destroyed, gridEl);
                    }
                } catch (err) { setError(err.message); }
            }, [triggerExplosionEffects, triggerHvDestroyEffects]);

            const randomize = useCallback(async (density = 0.3) => {
                try {
                    const response = await fetch(`${API_BASE}/api/randomize`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ density }) });
                    const data = await response.json();
                    setGameState(data);
                    showToast('网格已随机化');
                } catch (err) { setError(err.message); }
            }, [showToast]);

            const clear = useCallback(async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/clear`, { method: 'POST' });
                    const data = await response.json();
                    setGameState(data);
                    setIsPlaying(false);
                    showToast('网格已清空');
                } catch (err) { setError(err.message); }
            }, [showToast]);

            const saveCanvas = useCallback(async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/save`);
                    const data = await response.json();
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `lifegame-save-${new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-')}.json`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                    showToast('画布已保存');
                } catch (err) { setError(err.message); }
            }, [showToast]);

            const loadCanvas = useCallback(async (file) => {
                try {
                    const text = await file.text();
                    const data = JSON.parse(text);
                    const response = await fetch(`${API_BASE}/api/load`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: text,
                    });
                    const result = await response.json();
                    setGameState(result);
                    setGridSize({ width: result.width, height: result.height });
                    setIsPlaying(false);
                    showToast('画布已导入');
                } catch (err) {
                    showToast('导入失败: ' + err.message);
                }
            }, [showToast]);

            const toggleBorder = useCallback(async () => {
                try {
                    const response = await fetch(`${API_BASE}/api/toggle_border`, { method: 'POST' });
                    const data = await response.json();
                    setGameState(data);
                    showToast(data.has_border_walls ? '空气墙已开启' : '环面模式 (无边界)');
                } catch (err) { setError(err.message); }
            }, [showToast]);

            const togglePlay = useCallback(() => setIsPlaying(prev => !prev), []);
            const resize = useCallback((preset) => {
                const sizes = { small: { width: 30, height: 20, cell: 16 }, medium: { width: 60, height: 40, cell: 12 }, large: { width: 80, height: 50, cell: 10 } };
                const config = sizes[preset] || sizes.medium;
                initGrid(config.width, config.height);
                setCellSize(config.cell);
            }, [initGrid]);

            useEffect(() => {
                if (isPlaying) intervalRef.current = setInterval(step, 1000 / speed);
                else if (intervalRef.current) clearInterval(intervalRef.current);
                return () => { if (intervalRef.current) clearInterval(intervalRef.current); };
            }, [isPlaying, speed, step]);

            useEffect(() => { fetchState(); }, [fetchState]);

            return { gameState, isPlaying, speed, setSpeed, selectedTeam, setSelectedTeam, selectedPattern, setSelectedPattern, patternRotation, setPatternRotation, placePattern, gridSize, cellSize, isLoading, error, toast, togglePlay, step, randomize, clear, setCell, resize, effects, onEffectComplete, bombRadius, setBombRadius, placeBomb, saveCanvas, loadCanvas, toggleBorder, fileInputRef };
        };

        const GridCanvas = ({ cells, width, height, cellSize, selectedTeam, selectedPattern, patternRotation, onCellSet, onPlacePattern, onPlaceBomb, bombRadius, hasBorderWalls }) => {
            const isPaintingRef = useRef(false);
            const lastCellRef = useRef(null);
            
            const handleMouseDown = (e, x, y) => {
                e.preventDefault();
                if (selectedPattern) {
                    onPlacePattern(patternRotation, x, y, e.clientX, e.clientY);
                } else if (selectedTeam === 4) {
                    onPlaceBomb(x, y, bombRadius);
                } else {
                    isPaintingRef.current = true;
                    lastCellRef.current = `${x},${y}`;
                    onCellSet(x, y, selectedTeam);
                }
            };
            const handleMouseEnter = (e, x, y) => {
                if (selectedPattern || selectedTeam === 4 || !isPaintingRef.current) return;
                if (lastCellRef.current !== `${x},${y}`) { lastCellRef.current = `${x},${y}`; onCellSet(x, y, selectedTeam); }
            };
            const handleMouseUp = () => { isPaintingRef.current = false; lastCellRef.current = null; };
            useEffect(() => { window.addEventListener('mouseup', handleMouseUp); return () => window.removeEventListener('mouseup', handleMouseUp); }, []);
            const getCellClass = (cell) => cell === 1 ? 'red' : cell === 2 ? 'blue' : cell === 3 ? 'wall' : cell === 4 ? 'bomb' : cell === 5 ? 'high-value' : '';
            const cursorStyle = selectedPattern ? 'pointer' : selectedTeam === 4 ? 'crosshair' : 'crosshair';
            return (
                <div className="grid-canvas" style={{ gridTemplateColumns: `repeat(${width}, ${cellSize}px)`, gridTemplateRows: `repeat(${height}, ${cellSize}px)`, cursor: cursorStyle }}>
                    {cells && cells.map((row, y) => row.map((cell, x) => (<div key={`${x}-${y}`} className={`cell ${getCellClass(cell)}`} onMouseDown={(e) => handleMouseDown(e, x, y)} onMouseEnter={(e) => handleMouseEnter(e, x, y)} />)))}
                </div>
            );
        };

        const ControlPanel = ({ isPlaying, onTogglePlay, onStep, onRandomize, onClear, speed, onSpeedChange, selectedTeam, onTeamSelect, selectedPattern, onPatternSelect, patternRotation, onRotationChange, currentPreset, onResize, bombRadius, onBombRadiusChange, onSave, onLoad, fileInputRef, hasBorderWalls, onToggleBorder }) => (
            <div className="controls">
                <div className="control-group"><span className="control-label">模拟</span>
                    <div className="button-group">
                        <button className={`btn ${isPlaying ? 'active' : 'primary'}`} onClick={onTogglePlay}>{isPlaying ? <PauseIcon /> : <PlayIcon />}{isPlaying ? '暂停' : '播放'}</button>
                        <button className="btn" onClick={onStep}><StepIcon />单步</button>
                    </div>
                </div>
                <div className="control-group"><span className="control-label">阵营</span>
                    <div className="button-group">
                        <button className={`btn red-team ${selectedTeam === 1 ? 'active' : ''}`} onClick={() => onTeamSelect(1)}><span style={{ width: 10, height: 10, background: '#ff3366', borderRadius: '50%', display: 'inline-block' }}></span>红</button>
                        <button className={`btn blue-team ${selectedTeam === 2 ? 'active' : ''}`} onClick={() => onTeamSelect(2)}><span style={{ width: 10, height: 10, background: '#3366ff', borderRadius: '50%', display: 'inline-block' }}></span>蓝</button>
                        <button className={`btn wall-team ${selectedTeam === 3 ? 'active' : ''}`} onClick={() => onTeamSelect(3)}><span style={{ width: 10, height: 10, background: '#555566', borderRadius: '2px', display: 'inline-block' }}></span>墙</button>
                        <button className={`btn eraser ${selectedTeam === 0 ? 'active' : ''}`} onClick={() => onTeamSelect(0)}><span style={{ width: 10, height: 10, border: '2px dashed #666680', borderRadius: '2px', display: 'inline-block' }}></span>擦</button>
                        <button className={`btn bomb-team ${selectedTeam === 4 ? 'active' : ''}`} onClick={() => onTeamSelect(4)}><span style={{ width: 10, height: 10, background: '#ff9933', borderRadius: '50%', display: 'inline-block' }}></span>弹</button>
                        <button className={`btn hv-team ${selectedTeam === 5 ? 'active' : ''}`} onClick={() => onTeamSelect(5)}><span style={{ width: 10, height: 10, background: 'linear-gradient(135deg, #ffd700, #ffaa00)', clipPath: 'polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%)', display: 'inline-block' }}></span>宝</button>
                    </div>
                    {selectedTeam === 4 && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '8px' }}>
                            <span className="control-label" style={{ margin: 0 }}>爆炸半径:</span>
                            <div className="slider-container">
                                <input type="range" className="slider" min="1" max="20" value={bombRadius} onChange={(e) => onBombRadiusChange(Number(e.target.value))} style={{ width: 80 }} />
                                <span style={{ fontSize: 13, color: '#ff9933' }}>{bombRadius}</span>
                            </div>
                        </div>
                    )}
                </div>
                {(selectedTeam === 1 || selectedTeam === 2) && (
                <div className="control-group patterns-section">
                    <span className="control-label">经典结构 {selectedPattern && `→ ${PATTERNS[selectedPattern]?.name}`}</span>
                    <div className="patterns-container">
                        {Object.entries(PATTERNS).map(([key, pattern]) => (<button key={key} className={`pattern-btn ${selectedPattern === key ? 'active' : ''}`} onClick={() => onPatternSelect(selectedPattern === key ? null : key)}>{pattern.name}<PatternPreview pattern={pattern} rotation={selectedPattern === key ? patternRotation : 0} /></button>))}
                    </div>
                    {selectedPattern && (
                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginTop: '8px' }}>
                            <span className="control-label" style={{ margin: 0 }}>旋转:</span>
                            <div className="rotate-group">
                                {[0, 90, 180, 270].map(r => (<button key={r} className={`rotate-btn ${patternRotation === r ? 'active' : ''}`} onClick={() => onRotationChange(r)}>{r}°</button>))}
                            </div>
                        </div>
                    )}
                </div>
                )}
                <div className="control-group"><span className="control-label">种群</span>
                    <div className="button-group">
                        <button className="btn" onClick={() => onRandomize(0.3)}><RefreshIcon />随机</button>
                        <button className="btn" onClick={onClear}><TrashIcon />清空</button>
                    </div>
                </div>
                <div className="control-group"><span className="control-label">存档</span>
                    <div className="button-group">
                        <button className="btn" onClick={onSave}><SaveIcon />保存</button>
                        <button className="btn" onClick={() => fileInputRef.current && fileInputRef.current.click()}><LoadIcon />导入</button>
                    </div>
                </div>
                <div className="control-group"><span className="control-label">速度</span>
                    <div className="slider-container">
                        <input type="range" className="slider" min="1" max="30" value={speed} onChange={(e) => onSpeedChange(Number(e.target.value))} />
                        <span className="slider-value">{speed} 代/秒</span>
                    </div>
                </div>
                <div className="control-group"><span className="control-label">边界</span>
                    <div className="button-group">
                        <button className={`btn border-toggle ${hasBorderWalls ? 'active' : ''}`} onClick={onToggleBorder}>
                            {hasBorderWalls ? '空气墙' : '环面'}
                        </button>
                    </div>
                </div>
                <div className="control-group"><span className="control-label">大小</span>
                    <div className="button-group">
                        <button className={`preset-btn ${currentPreset === 'small' ? 'active' : ''}`} onClick={() => onResize('small')}>小</button>
                        <button className={`preset-btn ${currentPreset === 'medium' ? 'active' : ''}`} onClick={() => onResize('medium')}>中</button>
                        <button className={`preset-btn ${currentPreset === 'large' ? 'active' : ''}`} onClick={() => onResize('large')}>大</button>
                    </div>
                </div>
            </div>
        );

        const Rules = () => (
            <div className="rules">
                <h3>游戏规则</h3>
                <div className="rules-grid">
                    <div className="rule"><div className="rule-icon die">1</div><span>孤独死亡：活细胞邻居少于 2 个时死亡</span></div>
                    <div className="rule"><div className="rule-icon die">2</div><span>过度拥挤：活细胞邻居超过 3 个时死亡</span></div>
                    <div className="rule"><div className="rule-icon red">3</div><span>正常生存：2-3 个邻居时存活</span></div>
                    <div className="rule"><div className="rule-icon blue">4</div><span>多数繁殖：恰好 3 个邻居时复活，多数阵营决定颜色</span></div>
                    <div className="rule"><div className="rule-icon" style={{ background: 'rgba(85,85,102,0.3)', color: '#555566' }}>W</div><span>墙壁：不生成细胞，不被计为邻居，永远不变</span></div>
                    <div className="rule"><div className="rule-icon" style={{ background: 'rgba(255,153,51,0.3)', color: '#ff9933' }}>B</div><span>炸弹：放置后静待，当细胞触碰时爆炸清除范围内所有格子</span></div>
                    <div className="rule"><div className="rule-icon" style={{ background: 'rgba(255,215,0,0.3)', color: '#ffd700' }}>V</div><span>高价值单位：红色细胞触碰时消除，蓝色视为墙壁，可被炸弹摧毁</span></div>
                </div>
            </div>
        );

        const Toast = ({ show, message }) => (<div className={`toast ${show ? 'show' : ''}`}>{message}</div>);
        const ErrorScreen = ({ message }) => (<div className="app" style={{ justifyContent: 'center', alignItems: 'center', minHeight: '100vh' }}><div style={{ textAlign: 'center', padding: '40px' }}><h2 style={{ marginBottom: '12px', color: '#ff3366' }}>连接失败</h2><p style={{ color: '#666680' }}>无法连接到服务器。请确保 Rust 后端正在运行: <code style={{ background: '#1a1a2e', padding: '4px 8px', borderRadius: '4px' }}>cargo run</code></p><p style={{ color: '#666680', fontSize: '12px', marginTop: '8px' }}>错误: {message}</p></div></div>);

        const App = () => {
            const { gameState, isPlaying, speed, setSpeed, selectedTeam, setSelectedTeam, selectedPattern, setSelectedPattern, patternRotation, setPatternRotation, placePattern, gridSize, cellSize, isLoading, error, toast, togglePlay, step, randomize, clear, setCell, resize, effects, bombRadius, setBombRadius, placeBomb, saveCanvas, loadCanvas, toggleBorder, fileInputRef } = useGameState();
            if (isLoading) return (<div className="loading"><div className="loading-spinner"></div><div class="loading-text">初始化生命引擎...</div></div>);
            if (error) return <ErrorScreen message={error} />;
            const totalCells = gridSize.width * gridSize.height;
            const currentPreset = totalCells === 600 ? 'medium' : totalCells === 30 * 20 ? 'small' : totalCells === 80 * 50 ? 'large' : null;
            return (<div className="app">
                <header className="header">
                    <div className="logo"><div className="logo-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#0a0a0f" strokeWidth="2.5"><circle cx="8" cy="8" r="4" fill="#ff3366"></circle><circle cx="16" cy="8" r="4" fill="#3366ff"></circle><circle cx="8" cy="16" r="4" fill="#3366ff"></circle><circle cx="16" cy="16" r="4" fill="#ff3366"></circle></svg></div><div className="logo-text"><h1>两阵营生命游戏</h1><p>红色 vs 蓝色 · 多数原则繁殖</p></div></div>
                    <div className="stats"><div className="stat"><div className="stat-value" style={{ color: '#e0e0e0' }}>{gameState?.generation || 0}</div><div className="stat-label">代数</div></div><div className="stat"><div className="stat-value" style={{ color: '#ff3366' }}>{gameState?.red_count || 0}</div><div className="stat-label">红</div></div><div className="stat"><div className="stat-value" style={{ color: '#3366ff' }}>{gameState?.blue_count || 0}</div><div className="stat-label">蓝</div></div></div>
                </header>
                <div className={`grid-container ${gameState?.has_border_walls ? 'border-walls' : ''}`}>
                    {gameState?.has_border_walls && <div className="border-indicator">AIR WALL</div>}
                    <GridCanvas cells={gameState?.cells} width={gridSize.width} height={gridSize.height} cellSize={cellSize} selectedTeam={selectedTeam} selectedPattern={selectedPattern} patternRotation={patternRotation} onCellSet={setCell} onPlacePattern={(rot, x, y, clientX, clientY) => placePattern(selectedPattern, rot, x, y, clientX, clientY)} onPlaceBomb={placeBomb} bombRadius={bombRadius} hasBorderWalls={gameState?.has_border_walls} />
                </div>
                <ControlPanel isPlaying={isPlaying} onTogglePlay={togglePlay} onStep={step} onRandomize={randomize} onClear={clear} speed={speed} onSpeedChange={setSpeed} selectedTeam={selectedTeam} onTeamSelect={(t) => { setSelectedTeam(t); if (t !== 1 && t !== 2) setSelectedPattern(null); }} selectedPattern={selectedPattern} onPatternSelect={setSelectedPattern} patternRotation={patternRotation} onRotationChange={setPatternRotation} currentPreset={currentPreset} onResize={resize} bombRadius={bombRadius} onBombRadiusChange={setBombRadius} onSave={saveCanvas} onLoad={loadCanvas} fileInputRef={fileInputRef} hasBorderWalls={gameState?.has_border_walls} onToggleBorder={toggleBorder} />
                <input type="file" accept=".json" className="hidden-input" ref={fileInputRef} onChange={(e) => { if (e.target.files[0]) { loadCanvas(e.target.files[0]); e.target.value = ''; } }} />
                <Rules />
                <Toast show={toast.show} message={toast.message} />
                <PatternEffects effects={effects} />
            </div>);
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
